<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blur: 28px;
  --glass: rgba(255,255,255,0.58);
  --glass-border: rgba(255,255,255,0.78);
  --glass-hover: rgba(255,255,255,0.82);
  --shadow: 0 4px 24px rgba(90,110,170,0.09);
  --shadow-hover: 0 8px 36px rgba(90,110,170,0.17);
  --text: #1c1f28;
  --muted: #8e93a3;
  --accent: #3d7eff;
  --radius: 18px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background: #d8e7f5;
  overflow-x: hidden;
  color: var(--text);
}
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 12% 12%, #bdd5f5 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 88% 82%, #d0c8f5 0%, transparent 58%),
    radial-gradient(ellipse 45% 40% at 55% 35%, #c0eaf5 0%, transparent 58%),
    linear-gradient(155deg, #d8e8f6 0%, #e6ddf6 50%, #cfe8f5 100%);
}
.orb { position:fixed; z-index:0; border-radius:50%; filter:blur(90px); animation:drift 18s ease-in-out infinite; }
.o1 { width:580px;height:580px;background:rgba(110,165,255,0.2);top:-160px;left:-160px; }
.o2 { width:420px;height:420px;background:rgba(175,135,255,0.17);bottom:-90px;right:-90px;animation-delay:-7s; }
.o3 { width:280px;height:280px;background:rgba(90,215,230,0.17);top:42%;left:58%;animation-delay:-3s; }
@keyframes drift {
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(24px,-32px)}
  66%{transform:translate(-16px,20px)}
}
.wrap { position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 22px 80px; }
.topbar { padding:32px 0 28px; display:flex; align-items:center; gap:12px; }
.search-box { flex:1; position:relative; max-width:440px; }
.search-box input {
  width:100%; padding:12px 18px 12px 44px;
  border-radius:50px;
  border:1.5px solid var(--glass-border);
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(180%);
  font-family:'DM Sans',sans-serif; font-size:0.88rem;
  color:var(--text); outline:none;
  box-shadow:var(--shadow);
  transition:box-shadow .2s,border-color .2s;
}
.search-box input::placeholder{color:var(--muted);}
.search-box input:focus{
  box-shadow:0 0 0 3px rgba(61,126,255,0.14),var(--shadow);
  border-color:rgba(61,126,255,0.38);
}
.si { position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.38;pointer-events:none; }
.si svg{width:15px;height:15px;display:block;}
.pills { display:flex;gap:7px;flex-wrap:wrap;padding-bottom:28px; }
.pill {
  padding:6px 15px; border-radius:50px;
  border:1.5px solid rgba(255,255,255,0.68);
  background:rgba(255,255,255,0.42);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  font-size:0.76rem;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap;
}
.pill:hover{color:var(--text);background:rgba(255,255,255,0.65);}
.pill.active{background:rgba(61,126,255,0.11);border-color:rgba(61,126,255,0.3);color:var(--accent);}
.meta{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);margin-bottom:12px;}
.grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px; }
.card {
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(180%);
  border:1.5px solid var(--glass-border);
  border-radius:var(--radius);
  padding:16px 15px;
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;gap:9px;
  box-shadow:var(--shadow);
  transition:transform .22s,box-shadow .22s,background .22s;
  animation:fadeUp .32s both;
}
.card:hover{transform:translateY(-4px);background:var(--glass-hover);box-shadow:var(--shadow-hover);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-head{display:flex;align-items:center;gap:10px;}
.card-logo {
  width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,0.75);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,0.92);
  box-shadow:0 2px 7px rgba(0,0,0,0.06);
}
.card-logo img{width:24px;height:24px;object-fit:contain;}
.card-logo .fb{font-family:'DM Mono',monospace;font-size:0.7rem;font-weight:500;color:var(--accent);}
.card-name{font-size:0.86rem;font-weight:600;line-height:1.25;}
.card-desc{font-size:0.73rem;color:var(--muted);line-height:1.5;}
.card-cat{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--accent);opacity:.65;margin-top:auto;letter-spacing:.03em;}
.empty{grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-size:0.82rem;display:none;}

/* Modal Styles */
.modal { position:fixed; inset:0; z-index:10; background:rgba(28,31,40,0.9); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; opacity:1; animation:fadeIn 0.4s ease-out; }
.modal-content { background:var(--glass); backdrop-filter:blur(var(--blur)) saturate(180%); border:1.5px solid var(--glass-border); border-radius:var(--radius); padding:48px 36px; text-align:center; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-hover); }
.modal-content h1 { font-size:2rem; font-weight:600; margin-bottom:8px; background:linear-gradient(135deg, var(--accent), #10b981); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.modal-content p { color:var(--muted); font-size:1rem; margin-bottom:32px; }
.domain-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:16px; }
.domain-btn { padding:20px; border-radius:var(--radius); border:1.5px solid var(--glass-border); background:var(--glass); backdrop-filter:blur(var(--blur)) saturate(180%); cursor:pointer; transition:all 0.3s ease; font-size:1rem; font-weight:500; color:var(--text); text-decoration:none; position:relative; overflow:hidden; }
.domain-btn:hover { background:var(--glass-hover); transform:translateY(-4px); box-shadow:var(--shadow-hover); border-color:rgba(61,126,255,0.4); }
.domain-btn.active { background:rgba(61,126,255,0.11); border-color:var(--accent); color:var(--accent); }
.domain-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent); opacity:0; transition:opacity 0.3s; }
.domain-btn:hover::before { opacity:1; animation:shimmer 1.5s infinite; }
@keyframes shimmer { 0% { transform:translateX(-100%); } 100% { transform:translateX(100%); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@media(max-width:540px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;}
  .topbar{flex-direction:column;align-items:stretch;}
  .search-box{max-width:100%;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="wrap">
  <div class="topbar">
    <div class="search-box">
      <span class="si"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="18" y2="18"/></svg></span>
      <input id="q" type="text" placeholder="Search tools..." autocomplete="off" spellcheck="false">
    </div>
    <button id="domain-btn" style="padding:12px 20px; border-radius:var(--radius); border:1.5px solid var(--glass-border); background:var(--glass); backdrop-filter:blur(var(--blur)) saturate(180%); cursor:pointer; transition:all 0.3s ease; font-size:0.88rem; font-weight:500; color:var(--text);">Domains</button>
  </div>
  <div class="pills" id="pills">
    <div class="pill active" data-cat="all">All</div>
    <div class="pill" data-cat="code">Code</div>
    <div class="pill" data-cat="ai">AI/ML</div>
    <div class="pill" data-cat="cloud">Cloud</div>
    <div class="pill" data-cat="research">Research</div>
    <div class="pill" data-cat="learn">Learn</div>
    <div class="pill" data-cat="tools">Tools</div>
  </div>
  <div class="meta"><span id="cnt">0</span> tools • <span id="domain-info">All domains</span></div>
  <div class="grid" id="grid"><div class="empty" id="empty">Select domains or search</div></div>
</div>

<!-- Domain Modal -->
<div id="domain-modal" class="modal" style="display:none;">
  <div class="modal-content">
    <h1>Tech Domains</h1>
    <p>Tap to filter tools by domain</p>
    <div class="domain-grid" id="domain-grid"></div>
  </div>
</div>

<script>
const FAV = d => `https://www.google.com/s2/favicons?domain=${d}&sz=64`;
const sites = [
  // Original + extended tools mapped to categories
  {name:"GitHub",url:"https://github.com",desc:"Version control & collaboration",cat:"code"},
  {name:"GitLab",url:"https://gitlab.com",desc:"DevOps platform with CI/CD",cat:"cloud"},
  {name:"VS Code Web",url:"https://vscode.dev",desc:"Full VS Code in browser",cat:"code"},
  {name:"CodePen",url:"https://codepen.io",desc:"Live HTML/CSS/JS playground",cat:"code"},
  {name:"Replit",url:"https://replit.com",desc:"Cloud IDE & deploy",cat:"code"},
  {name:"Stack Overflow",url:"https://stackoverflow.com",desc:"Programming Q&A",cat:"learn"},
  {name:"DevDocs",url:"https://devdocs.io",desc:"API docs for 200+ languages",cat:"code"},
  {name:"LeetCode",url:"https://leetcode.com",desc:"Coding interviews DSA",cat:"code"},
  {name:"npm",url:"https://npmjs.com",desc:"Node.js packages",cat:"code"},
  {name:"PyPI",url:"https://pypi.org",desc:"Python packages",cat:"code"},
  {name:"Hugging Face",url:"https://huggingface.co",desc:"AI models/datasets",cat:"ai"},
  {name:"Claude",url:"https://claude.ai",desc:"Anthropic reasoning AI",cat:"ai"},
  {name:"ChatGPT",url:"https://chat.openai.com",desc:"GPT conversational AI",cat:"ai"},
  {name:"Gemini",url:"https://gemini.google.com",desc:"Google multimodal AI",cat:"ai"},
  {name:"Perplexity",url:"https://perplexity.ai",desc:"AI search engine",cat:"ai"},
  {name:"OpenAI API",url:"https://platform.openai.com",desc:"GPT API & tools",cat:"ai"},
  {name:"Kaggle",url:"https://kaggle.com",desc:"ML competitions datasets",cat:"ai"},
  {name:"Google Colab",url:"https://colab.research.google.com",desc:"GPU Jupyter notebooks",cat:"ai"},
  {name:"Papers With Code",url:"https://paperswithcode.com",desc:"ML papers + code",cat:"research"},
  {name:"PyTorch",url:"https://pytorch.org",desc:"Deep learning framework",cat:"ai"},
  {name:"arXiv",url:"https://arxiv.org",desc:"AI/math preprints",cat:"research"},
  {name:"Vercel",url:"https://vercel.com",desc:"Frontend deployments",cat:"cloud"},
  {name:"Supabase",url:"https://supabase.com",desc:"Postgres + auth",cat:"cloud"},
  {name:"Cloudflare",url:"https://cloudflare.com",desc:"CDN Workers Pages",cat:"cloud"},
  {name:"Postman",url:"https://postman.com",desc:"API development",cat:"tools"},
  {name:"Regex101",url:"https://regex101.com",desc:"Regex tester",cat:"tools"},
  {name:"Excalidraw",url:"https://excalidraw.com",desc:"Diagrams sketches",cat:"tools"},
  {name:"OWASP",url:"https://owasp.org",desc:"Web security standards",cat:"tools"},
  {name:"HackTheBox",url:"https://hackthebox.com",desc:"Cyber training",cat:"tools"},
  {name:"Adafruit",url:"https://adafruit.com",desc:"IoT hardware",cat:"cloud"},
  {name:"roadmap.sh",url:"https://roadmap.sh",desc:"Dev role roadmaps",cat:"learn"},
  // + more can be added
];

const grid = document.getElementById('grid'),
      empty = document.getElementById('empty'),
      cntEl = document.getElementById('cnt'),
      qEl = document.getElementById('q'),
      pillsEl = document.getElementById('pills'),
      domainBtn = document.getElementById('domain-btn'),
      modal = document.getElementById('domain-modal'),
      domainGrid = document.getElementById('domain-grid'),
      domainInfo = document.getElementById('domain-info');

let cat = 'all', q = '', currentDomain = '';

const domains = [
  {id:'ai', name:'AI/ML', related: ['ai', 'code'], color:'#3d7eff'},
  {id:'code', name:'Coding', related: ['code', 'cloud'], color:'#10b981'},
  {id:'cloud', name:'Cloud/DevOps', related: ['cloud', 'code'], color:'#f59e0b'},
  {id:'cyber', name:'Cybersecurity', related: ['tools', 'cloud'], color:'#ef4444'},
  {id:'iot', name:'IoT', related: ['cloud', 'tools'], color:'#8b5cf6'},
  {id:'research', name:'Research', related: ['ai', 'learn'], color:'#06b6d4'},
  {id:'learn', name:'Learning', related: ['code', 'research'], color:'#ec4899'}
];

const getDomain = u => {
  try { return new URL(u).hostname.replace('www.', ''); } catch { return ''; }
};
const initials = n => n.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

function render() {
  const lq = q.toLowerCase();
  const f = sites.filter(s => (cat === 'all' || s.cat === cat) && (!lq || 
    s.name.toLowerCase().includes(lq) || s.desc.toLowerCase().includes(lq) || s.cat.includes(lq)));
  [...grid.querySelectorAll('.card')].forEach(c => c.remove());
  empty.style.display = f.length ? 'none' : 'block';
  cntEl.textContent = f.length;
  domainInfo.textContent = currentDomain ? `Showing ${currentDomain}` : 'All domains';
  f.forEach((s, i) => {
    const a = document.createElement('a');
    a.className = 'card'; a.href = s.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.style.animationDelay = `${Math.min(i * .028, .38)}s`;
    const d = getDomain(s.url);
    a.innerHTML = `<div class="card-head"><div class="card-logo"><img src="${FAV(d)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="fb" style="display:none;align-items:center;justify-content:center;width:100%;height:100%">${initials(s.name)}</span></div><div class="card-name">${s.name}</div></div><div class="card-desc">${s.desc}</div><div class="card-cat">${s.cat}</div>`;
    grid.insertBefore(a, empty);
  });
}

function setDomain(domainId) {
  currentDomain = domains.find(d => d.id === domainId).name;
  localStorage.setItem('currentDomain', domainId);
  const domain = domains.find(d => d.id === domainId);
  const relatedCats = [...new Set([domain.id, ...domain.related])];
  [...pillsEl.querySelectorAll('.pill')].forEach(p => {
    p.classList.toggle('active', relatedCats.includes(p.dataset.cat));
  });
  cat = domain.id;
  modal.style.display = 'none';
  render();
}

// Init domains
domains.forEach(d => {
  const btn = document.createElement('div');
  btn.className = `domain-btn ${localStorage.getItem('currentDomain') === d.id ? 'active' : ''}`;
  btn.style.borderColor = d.color + '20';
  btn.innerHTML = `<strong style="color: ${d.color};">${d.name}</strong>`;
  btn.onclick = () => setDomain(d.id);
  domainGrid.appendChild(btn);
});

// Event listeners
pillsEl.addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  [...pillsEl.querySelectorAll('.pill')].forEach(x => x.classList.remove('active'));
  p.classList.add('active');
  cat = p.dataset.cat;
  currentDomain = '';
  localStorage.removeItem('currentDomain');
  render();
});
qEl.addEventListener('input', () => { q = qEl.value; render(); });
domainBtn.onclick = () => modal.style.display = 'flex';

// Load saved domain
const savedDomain = localStorage.getItem('currentDomain');
if (savedDomain) setDomain(savedDomain);

render();
</script>
</body>
</html>
